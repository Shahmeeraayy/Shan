<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FS Wholesale Distributors UK — Edinburgh's Trade Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --ink: #0B1F3A;
    --ink-2: #142B4E;
    --paper: #F4EFE6;
    --paper-2: #EBE4D6;
    --line: #D9D0BE;
    --mute: #6A7587;
    --gold: #E8A33D;
    --gold-deep: #B5781F;
    --rust: #C44A2D;
    --moss: #2E5240;
    --white: #FFFDF8;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Bricolage Grotesque", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02";
    line-height: 1.5;
  }
  .serif { font-family: "Instrument Serif", "Times New Roman", serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  .container { max-width: 1400px; margin: 0 auto; padding: 0 32px; }
  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .eyebrow .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin-right: 10px; vertical-align: middle; transform: translateY(-1px); }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    border-radius: 999px;
    font-size: 14.5px; font-weight: 500;
    border: 1px solid transparent;
    transition: all .2s ease;
    white-space: nowrap;
  }
  .btn-primary { background: var(--ink); color: var(--white); }
  .btn-primary:hover { background: var(--ink-2); transform: translateY(-1px); }
  .btn-gold { background: var(--gold); color: var(--ink); }
  .btn-gold:hover { background: var(--gold-deep); color: var(--white); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn-ghost:hover { background: var(--ink); color: var(--white); }
  .btn-ghost-light { background: transparent; color: var(--white); border-color: rgba(255,255,255,0.4); }
  .btn-ghost-light:hover { background: var(--white); color: var(--ink); border-color: var(--white); }
  .btn .arr { display: inline-block; transition: transform .2s ease; }
  .btn:hover .arr { transform: translateX(3px); }

  /* Announce bar */
  .announce {
    background: var(--ink); color: var(--white);
    font-size: 12.5px; letter-spacing: 0.02em;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .announce .container { display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
  .announce .left { display: flex; gap: 28px; align-items: center; }
  .announce .right { display: flex; gap: 22px; align-items: center; opacity: 0.85; }
  .announce a:hover { color: var(--gold); }
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4ade80; margin-right: 8px; box-shadow: 0 0 0 0 #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6);} 70%{ box-shadow: 0 0 0 8px rgba(74,222,128,0);} 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0);} }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(10px);
  }
  .header .container { display: flex; align-items: center; justify-content: space-between; padding-top: 18px; padding-bottom: 18px; gap: 36px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--ink); color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: "Instrument Serif", serif;
    font-size: 22px; font-weight: 500;
    position: relative; overflow: hidden;
  }
  .logo-mark::after { content: ""; position: absolute; right: 4px; bottom: 4px; width: 8px; height: 8px; background: var(--gold); border-radius: 2px; }
  .logo-text { line-height: 1.05; }
  .logo-text .lt-1 { font-family: "Instrument Serif", serif; font-size: 20px; }
  .logo-text .lt-2 { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mute); margin-top: 2px; font-weight: 500; }
  .nav { display: flex; gap: 32px; }
  .nav a { font-size: 14.5px; font-weight: 500; padding: 6px 0; position: relative; }
  .nav a:hover { color: var(--gold-deep); }
  .nav a.has-caret::after { content: "↓"; display: inline-block; margin-left: 4px; font-size: 10px; opacity: 0.6; transform: translateY(-1px); }
  .header-cta { display: flex; gap: 12px; align-items: center; }

  /* HERO */
  .hero { padding: 70px 0 90px; position: relative; overflow: hidden; }
  .hero-grid {
    display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 60px; align-items: end;
  }
  .hero h1 {
    font-family: "Instrument Serif", serif;
    font-size: clamp(56px, 7.2vw, 116px);
    line-height: 0.95;
    margin: 22px 0 0;
    letter-spacing: -0.025em;
    text-wrap: balance;
  }
  .hero h1 .italic { font-style: italic; color: var(--gold-deep); }
  .hero h1 .ampersand { font-style: italic; font-weight: 400; }
  .hero p.lede {
    font-size: 19px; line-height: 1.55; color: var(--ink); opacity: 0.78;
    max-width: 520px; margin: 28px 0 36px;
    text-wrap: pretty;
  }
  .hero-ctas { display: flex; gap: 14px; align-items: center; }
  .hero-meta {
    display: flex; gap: 36px; margin-top: 48px; padding-top: 32px;
    border-top: 1px solid var(--line);
  }
  .hero-meta .m { display: flex; flex-direction: column; gap: 4px; }
  .hero-meta .m .num { font-family: "Instrument Serif", serif; font-size: 38px; line-height: 1; }
  .hero-meta .m .lbl { font-size: 12px; color: var(--mute); letter-spacing: 0.06em; }

  /* Hero collage */
  .collage { position: relative; height: 580px; }
  .collage .card {
    position: absolute;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 50px -20px rgba(11,31,58,0.25), 0 2px 6px rgba(11,31,58,0.06);
  }
  .collage .c1 { left: 0; top: 0; width: 56%; height: 62%; transform: rotate(-1.5deg); }
  .collage .c2 { right: 0; top: 42px; width: 44%; height: 48%; transform: rotate(1.5deg); }
  .collage .c3 { left: 8%; bottom: 0; width: 52%; height: 38%; transform: rotate(0.8deg); }
  .collage .c4 { right: 4%; bottom: 18px; width: 42%; height: 44%; transform: rotate(-1deg); }
  .collage .card:hover { transform: scale(1.02) rotate(0deg); transition: transform .3s ease; z-index: 5; }

  .tag {
    position: absolute;
    background: var(--white); color: var(--ink);
    padding: 8px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 6px 20px rgba(11,31,58,0.12);
    z-index: 10;
  }
  .tag .ic { width: 18px; height: 18px; border-radius: 50%; background: var(--gold); color: var(--ink); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }

  /* Marquee */
  .marquee-wrap { background: var(--ink); color: var(--white); padding: 22px 0; overflow: hidden; position: relative; }
  .marquee-wrap::before, .marquee-wrap::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none;
  }
  .marquee-wrap::before { left: 0; background: linear-gradient(to right, var(--ink), transparent); }
  .marquee-wrap::after { right: 0; background: linear-gradient(to left, var(--ink), transparent); }
  .marquee { display: flex; gap: 56px; white-space: nowrap; animation: marquee 38s linear infinite; }
  .marquee .item { display: flex; align-items: center; gap: 56px; font-family: "Instrument Serif", serif; font-size: 28px; opacity: 0.82; }
  .marquee .item .star { color: var(--gold); }
  @keyframes marquee { from { transform: translateX(0);} to { transform: translateX(-50%);} }

  /* Section header */
  .sec { padding: 100px 0; }
  .sec-head { display: grid; grid-template-columns: 1.4fr 1fr; gap: 80px; align-items: end; margin-bottom: 56px; }
  .sec-head h2 { font-family: "Instrument Serif", serif; font-size: clamp(40px, 5vw, 72px); line-height: 1; letter-spacing: -0.02em; margin: 14px 0 0; max-width: 14ch; text-wrap: balance; }
  .sec-head .right { color: var(--ink); opacity: 0.75; font-size: 16px; line-height: 1.6; max-width: 460px; text-wrap: pretty; }

  /* Categories */
  .cats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
  }
  .cat {
    background: var(--white);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--line);
    transition: all .25s ease;
    cursor: pointer;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 280px;
  }
  .cat:hover { transform: translateY(-4px); border-color: var(--ink); box-shadow: 0 20px 40px -20px rgba(11,31,58,0.2); }
  .cat .illo { flex: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; min-height: 140px; }
  .cat .ct { display: flex; justify-content: space-between; align-items: end; }
  .cat .cn { font-family: "Instrument Serif", serif; font-size: 26px; line-height: 1; }
  .cat .cm { font-size: 12px; color: var(--mute); margin-top: 6px; }
  .cat .arr { width: 32px; height: 32px; border-radius: 50%; background: var(--paper); display: flex; align-items: center; justify-content: center; transition: all .2s ease; }
  .cat:hover .arr { background: var(--gold); transform: rotate(-45deg); }

  /* Strip */
  .strip {
    background: var(--ink); color: var(--white);
    padding: 90px 0;
  }
  .strip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }
  .stat .num { font-family: "Instrument Serif", serif; font-size: 76px; line-height: 1; letter-spacing: -0.02em; color: var(--gold); }
  .stat .lbl { font-size: 14px; opacity: 0.85; margin-top: 12px; max-width: 200px; text-wrap: pretty; }

  /* Why us */
  .why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .why-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px;
    display: flex; flex-direction: column; gap: 20px;
    min-height: 280px;
  }
  .why-card.dark { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .why-card.gold { background: var(--gold); color: var(--ink); border-color: var(--gold); }
  .why-card .num { font-family: "JetBrains Mono", monospace; font-size: 12px; opacity: 0.6; letter-spacing: 0.1em; }
  .why-card h3 { font-family: "Instrument Serif", serif; font-size: 32px; line-height: 1.05; margin: 0; letter-spacing: -0.01em; }
  .why-card p { margin: 0; font-size: 15px; line-height: 1.55; opacity: 0.85; }
  .why-card .ic-wrap { margin-top: auto; }

  /* Brands */
  .brands { padding: 80px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--paper-2); }
  .brand-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .brand-cell { background: var(--paper-2); padding: 28px 16px; display: flex; align-items: center; justify-content: center; font-family: "Instrument Serif", serif; font-size: 22px; color: var(--ink); opacity: 0.7; transition: all .2s ease; }
  .brand-cell:hover { background: var(--white); opacity: 1; }

  /* Delivery */
  .deliv-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: center; }
  .map-wrap { position: relative; aspect-ratio: 4/5; }
  .deliv-list { display: flex; flex-direction: column; gap: 0; }
  .deliv-row {
    display: grid; grid-template-columns: 60px 1fr auto auto; gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
  }
  .deliv-row:first-child { border-top: 1px solid var(--line); }
  .deliv-row .idx { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--mute); }
  .deliv-row .city { font-family: "Instrument Serif", serif; font-size: 24px; }
  .deliv-row .time { font-size: 13px; color: var(--mute); }
  .deliv-row .badge {
    font-size: 11px; padding: 5px 10px; border-radius: 999px;
    background: rgba(46,82,64,0.1); color: var(--moss);
    letter-spacing: 0.04em; font-weight: 500;
  }
  .deliv-row .badge.gold { background: rgba(232,163,61,0.18); color: var(--gold-deep); }

  /* Testimonials */
  .test-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .quote {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 40px;
    display: flex; flex-direction: column; gap: 28px;
    position: relative;
  }
  .quote.featured { background: var(--ink); color: var(--white); border-color: var(--ink); grid-row: span 2; }
  .quote .mark {
    font-family: "Instrument Serif", serif;
    font-size: 80px; line-height: 0.5; color: var(--gold);
  }
  .quote .body { font-family: "Instrument Serif", serif; font-size: 26px; line-height: 1.25; letter-spacing: -0.01em; text-wrap: balance; }
  .quote.featured .body { font-size: 36px; }
  .quote .who { display: flex; align-items: center; gap: 14px; margin-top: auto; }
  .quote .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--gold); color: var(--ink); display: flex; align-items: center; justify-content: center; font-family: "Instrument Serif", serif; font-size: 20px; }
  .quote .who-name { font-size: 14px; font-weight: 500; }
  .quote .who-meta { font-size: 12px; opacity: 0.65; }

  /* Open Account */
  .openacc { background: var(--ink); color: var(--white); padding: 100px 0; position: relative; overflow: hidden; }
  .openacc::before {
    content: ""; position: absolute; right: -100px; top: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
    opacity: 0.15;
  }
  .openacc h2 { color: var(--white); }
  .openacc .sec-head .right { color: rgba(255,255,255,0.7); }
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; overflow: hidden; }
  .step { background: var(--ink); padding: 40px; display: flex; flex-direction: column; gap: 18px; min-height: 280px; }
  .step .n { font-family: "Instrument Serif", serif; font-size: 56px; color: var(--gold); line-height: 0.9; }
  .step h4 { font-family: "Instrument Serif", serif; font-size: 26px; margin: 0; line-height: 1.05; }
  .step p { margin: 0; opacity: 0.7; font-size: 15px; line-height: 1.55; }

  /* Big CTA */
  .bigcta { padding: 140px 0; text-align: center; background: var(--gold); position: relative; overflow: hidden; }
  .bigcta h2 { font-family: "Instrument Serif", serif; font-size: clamp(60px, 9vw, 144px); line-height: 0.95; margin: 0; letter-spacing: -0.03em; }
  .bigcta .it { font-style: italic; }
  .bigcta .sub { max-width: 580px; margin: 28px auto 36px; font-size: 18px; opacity: 0.85; }
  .bigcta .ctas { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .bigcta .corner { position: absolute; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
  .bigcta .tl { top: 32px; left: 32px; }
  .bigcta .tr { top: 32px; right: 32px; }
  .bigcta .bl { bottom: 32px; left: 32px; }
  .bigcta .br { bottom: 32px; right: 32px; }

  /* Footer */
  footer { background: var(--ink); color: var(--white); padding: 80px 0 32px; }
  .foot-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 60px; padding-bottom: 60px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .foot-col h5 { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin: 0 0 20px; font-weight: 500; }
  .foot-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
  .foot-col a { opacity: 0.75; font-size: 14px; }
  .foot-col a:hover { opacity: 1; color: var(--gold); }
  .foot-addr { font-size: 14px; line-height: 1.7; opacity: 0.85; }
  .foot-addr .phone { font-family: "Instrument Serif", serif; font-size: 28px; color: var(--white); display: block; margin-top: 8px; }
  .foot-bot { display: flex; justify-content: space-between; padding-top: 32px; font-size: 12px; opacity: 0.55; flex-wrap: wrap; gap: 16px; }

  /* Section divider */
  .divider { display: flex; align-items: center; gap: 16px; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute); margin: 0 0 0; padding: 24px 0; border-top: 1px solid var(--line); }
  .divider .line { flex: 1; height: 1px; background: var(--line); }

  /* Subtle paper texture overlay */
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply;
  }

  /* Responsive */
  @media (max-width: 960px) {
    .container { padding: 0 20px; }
    .nav, .header-cta .btn { display: none; }
    .hero-grid, .sec-head, .deliv-grid { grid-template-columns: 1fr; gap: 40px; }
    .cats { grid-template-columns: repeat(2, 1fr); }
    .strip-grid, .why-grid, .steps, .brand-grid { grid-template-columns: repeat(2, 1fr); }
    .test-grid { grid-template-columns: 1fr; }
    .foot-grid { grid-template-columns: 1fr 1fr; }
    .collage { height: 420px; }
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="illustrations.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
